---
# ══════════════════════════════════════════════════════════════════════
# App deployment — copies code, builds frontend, sets up Python venv,
# creates systemd service, starts the app
# ══════════════════════════════════════════════════════════════════════

# ── Install Node.js (for building frontend) ──────────────────────────
- name: Install Node.js repo (RedHat)
  ansible.builtin.shell: |
    curl -fsSL https://rpm.nodesource.com/setup_{{ nodejs_version }}.x | bash -
  args:
    creates: /etc/yum.repos.d/nodesource-*.repo
  when: ansible_os_family == "RedHat"

- name: Install Node.js repo (Debian)
  ansible.builtin.shell: |
    curl -fsSL https://deb.nodesource.com/setup_{{ nodejs_version }}.x | bash -
  args:
    creates: /etc/apt/sources.list.d/nodesource.list
  when: ansible_os_family == "Debian"

- name: Install Node.js
  ansible.builtin.package:
    name: nodejs
    state: present

# ── Copy application code ────────────────────────────────────────────
- name: Copy backend code
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../backend/"
    dest: "{{ app_base_dir }}/backend/"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0644"
    directory_mode: "0755"
  notify: restart app

- name: Copy frontend code
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../frontend/"
    dest: "{{ app_base_dir }}/frontend/"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0644"
    directory_mode: "0755"

# ── Build frontend ───────────────────────────────────────────────────
- name: Install frontend dependencies
  ansible.builtin.command:
    cmd: npm ci --no-audit --no-fund
    chdir: "{{ app_base_dir }}/frontend"
  become: true
  become_user: "{{ app_user }}"
  register: npm_install
  changed_when: "'added' in npm_install.stdout"

- name: Build frontend
  ansible.builtin.command:
    cmd: npm run build
    chdir: "{{ app_base_dir }}/frontend"
  become: true
  become_user: "{{ app_user }}"
  register: npm_build
  changed_when: true

- name: Copy built frontend to backend/static
  ansible.builtin.copy:
    src: "{{ app_base_dir }}/frontend/dist/"
    dest: "{{ app_base_dir }}/backend/static/"
    remote_src: true
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0644"
    directory_mode: "0755"
  notify: restart app

# ── Python virtual environment ───────────────────────────────────────
- name: Create Python virtual environment
  ansible.builtin.command:
    cmd: python3 -m venv {{ app_base_dir }}/venv
    creates: "{{ app_base_dir }}/venv/bin/activate"
  become: true
  become_user: "{{ app_user }}"

- name: Install Python dependencies
  ansible.builtin.pip:
    requirements: "{{ app_base_dir }}/backend/requirements.txt"
    virtualenv: "{{ app_base_dir }}/venv"
  become: true
  become_user: "{{ app_user }}"
  notify: restart app

# ── Environment file ─────────────────────────────────────────────────
- name: Create .env file
  ansible.builtin.template:
    src: env.j2
    dest: "{{ app_base_dir }}/backend/.env"
    owner: "{{ app_user }}"
    group: "{{ app_group }}"
    mode: "0600"
  notify: restart app

# ── Systemd service ──────────────────────────────────────────────────
- name: Create systemd service
  ansible.builtin.template:
    src: db-infra-ops.service.j2
    dest: /etc/systemd/system/{{ app_name }}.service
    owner: root
    group: root
    mode: "0644"
  notify:
    - reload systemd
    - restart app

- name: Enable and start the app
  ansible.builtin.systemd:
    name: "{{ app_name }}"
    state: started
    enabled: true

# ── Health check ─────────────────────────────────────────────────────
- name: Wait for app to be ready
  ansible.builtin.uri:
    url: "http://127.0.0.1:{{ app_port }}/api/ping"
    method: GET
    status_code: 200
  register: health_check
  retries: 15
  delay: 2
  until: health_check.status == 200
