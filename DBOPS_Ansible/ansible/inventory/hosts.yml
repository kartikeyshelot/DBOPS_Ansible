# ══════════════════════════════════════════════════════════════════════
# Inventory — list your target VM(s) here
# ══════════════════════════════════════════════════════════════════════
#
# Replace the IP/hostname below with your actual VM.
# For multiple VMs, add more entries under [app_servers].
#
# Usage:
#   ansible-playbook -i inventory/hosts.yml playbook.yml
# ══════════════════════════════════════════════════════════════════════

all:
  children:
    app_servers:
      hosts:
        db-infra-vm:
          ansible_host: 192.168.1.100           # ← Change to your VM IP
          ansible_user: your_ssh_user            # ← Change to your SSH user
          ansible_ssh_private_key_file: ~/.ssh/id_rsa  # ← Path to SSH key
          # ansible_password: "your_password"    # ← Uncomment if using password instead of key
          ansible_become: true                   # Needed for sudo
